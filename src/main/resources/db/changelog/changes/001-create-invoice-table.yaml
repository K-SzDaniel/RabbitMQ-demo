databaseChangeLog:
  - changeSet:
      id: 001-create-invoice-table
      author: milthdev
      changes:
        - createTable:
            tableName: invoices
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: invoice_number
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: customer_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: customer_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: customer_address
                  type: VARCHAR(500)

              - column:
                  name: issue_date
                  type: DATE

              - column:
                  name: due_date
                  type: DATE

              - column:
                  name: subtotal
                  type: DECIMAL(19,2)

              - column:
                  name: tax_amount
                  type: DECIMAL(19,2)

              - column:
                  name: total_amount
                  type: DECIMAL(19,2)

              - column:
                  name: currency
                  type: VARCHAR(10)

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: pdf_path
                  type: VARCHAR(500)

              - column:
                  name: error_message
                  type: VARCHAR(1000)

              - column:
                  name: created_at
                  type: DATETIME

              - column:
                  name: updated_at
                  type: DATETIME

              - column:
                  name: sent_at
                  type: DATETIME