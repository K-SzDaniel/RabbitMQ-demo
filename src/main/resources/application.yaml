spring:
  data:
    redis:
      redis:
        host: localhost
        port: 6379

  application:
    name: RabbitMQ demo

  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  datasource:
    url: jdbc:mysql://localhost:3306/rabbitmq
    username: user
    password: password
